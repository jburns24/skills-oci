name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"

          # Linux amd64
          GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/skills-linux-amd64 .
          # Linux arm64
          GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/skills-linux-arm64 .
          # macOS amd64
          GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/skills-darwin-amd64 .
          # macOS arm64
          GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/skills-darwin-arm64 .
          # Windows amd64
          GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/skills-windows-amd64.exe .

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/skills-linux-amd64
            dist/skills-linux-arm64
            dist/skills-darwin-amd64
            dist/skills-darwin-arm64
            dist/skills-windows-amd64.exe
            dist/checksums.txt
